name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: dll

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release library
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/libhayahoo.${{ matrix.ext }} hayahoo-${{ matrix.target }}.${{ matrix.ext }}

      - name: Prepare asset (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item target/${{ matrix.target }}/release/hayahoo.dll hayahoo-${{ matrix.target }}.dll

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: hayahoo-${{ matrix.target }}.*
